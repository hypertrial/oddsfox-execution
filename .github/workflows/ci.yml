name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  IMAGE: ghcr.io/hypertrial/oddsfox-execution

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.93.1 --profile minimal --component rustfmt,clippy
      - run: rustup default 1.93.1
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - run: cargo fmt --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo test --locked --all-features
      - run: cargo run --locked -- openapi --check openapi/oddsfox-execution-v1.json

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: rustup toolchain install 1.93.1 --profile minimal
      - run: rustup default 1.93.1
      - name: Install pinned audit tools
        run: |
          GOBIN="$HOME/.local/bin" go install github.com/zricethezav/gitleaks/v8@v8.30.1
          cargo install --locked ripgrep --version 14.1.1
          cargo install --locked cargo-audit --version 0.22.2
          cargo install --locked cargo-deny --version 0.19.7
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: bash scripts/full_history_audit.sh

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          load: true
          tags: oddsfox-execution:ci
          build-args: VCS_REF=${{ github.sha }}
          provenance: false
          sbom: false
      - run: bash scripts/assert_paper_only_image.sh oddsfox-execution:ci
      - name: Paper-mode smoke test
        run: |
          docker run --rm -d --name oddsfox-execution-ci \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --tmpfs /var/lib/oddsfox:rw,noexec,nosuid,size=64m,uid=10001,gid=10001 \
            -p 8787:8787 \
            -v "$PWD/config/container-paper.toml:/etc/oddsfox/oddsfox.toml:ro" \
            -v "$PWD/config/risk-policy.example.json:/etc/oddsfox/risk-policy.json:ro" \
            oddsfox-execution:ci
          trap 'docker logs oddsfox-execution-ci; docker stop oddsfox-execution-ci' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8787/health/ready; then
              exit 0
            fi
            sleep 1
          done
          exit 1

  publish-platforms:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [rust, supply-chain, container]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}-${{ matrix.suffix }}
          build-args: VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=execution-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=execution-${{ matrix.suffix }}
          provenance: mode=max
          sbom: true

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [publish-platforms]
    runs-on: ubuntu-24.04
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Assemble and verify multi-architecture manifest
        id: manifest
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${GITHUB_SHA}" \
            --tag "${IMAGE}:main" \
            --metadata-file /tmp/manifest-metadata.json \
            "${IMAGE}:${GITHUB_SHA}-amd64" \
            "${IMAGE}:${GITHUB_SHA}-arm64"
          digest="$(jq -r '."containerimage.descriptor".digest' /tmp/manifest-metadata.json)"
          test "${digest}" != "null"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
          platforms="$(
            docker buildx imagetools inspect "${IMAGE}@${digest}" \
              --format '{{json .Manifest}}' \
              | jq -r '[.manifests[].platform | select(.os != "unknown") | "\(.os)/\(.architecture)"] | sort | join(",")'
          )"
          test "${platforms}" = "linux/amd64,linux/arm64"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign image by digest
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true
