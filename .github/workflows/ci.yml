name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.93.1 --profile minimal --component rustfmt,clippy
      - run: rustup default 1.93.1
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - run: cargo fmt --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo test --locked --all-features
      - run: cargo run --locked -- openapi --check openapi/oddsfox-execution-v1.json

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.93.1 --profile minimal
      - run: rustup default 1.93.1
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Test paper execution on Windows
        run: cargo test --locked
      - name: Prove native-Windows live signing fails closed
        run: cargo test --locked --features live native_windows_live_signing_is_rejected

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: rustup toolchain install 1.93.1 --profile minimal
      - run: rustup default 1.93.1
      - name: Install pinned audit tools
        run: |
          GOBIN="$HOME/.local/bin" go install github.com/zricethezav/gitleaks/v8@v8.30.1
          cargo install --locked ripgrep --version 14.1.1
          cargo install --locked cargo-audit --version 0.22.2
          cargo install --locked cargo-deny --version 0.19.7
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: bash scripts/full_history_audit.sh

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build default paper image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg "VCS_REF=${GITHUB_SHA}" \
            --load \
            --tag oddsfox-execution:paper-ci \
            .
      - name: Build live-local image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --target live-local \
            --build-arg "VCS_REF=${GITHUB_SHA}" \
            --load \
            --tag oddsfox-execution:live-local-ci \
            .
      - run: bash scripts/assert_paper_only_image.sh oddsfox-execution:paper-ci "$GITHUB_SHA"
      - run: bash scripts/assert_live_local_image.sh oddsfox-execution:live-local-ci "$GITHUB_SHA"
      - name: Paper-mode smoke test
        run: |
          docker run --rm -d --name oddsfox-execution-ci \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --tmpfs /var/lib/oddsfox:rw,noexec,nosuid,size=64m,uid=10001,gid=10001 \
            -p 8787:8787 \
            -v "$PWD/config/container-paper.toml:/etc/oddsfox/oddsfox.toml:ro" \
            -v "$PWD/config/risk-policy.example.json:/etc/oddsfox/risk-policy.json:ro" \
            oddsfox-execution:paper-ci
          trap 'docker logs oddsfox-execution-ci; docker stop oddsfox-execution-ci' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8787/health/ready; then
              exit 0
            fi
            sleep 1
          done
          exit 1
