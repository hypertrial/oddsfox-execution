name: Manual Full Validation

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: manual-full-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  linux-full:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: rustup toolchain install 1.93.1 --profile minimal --component rustfmt,clippy
      - uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-
      - uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: target
          key: cargo-target-${{ runner.os }}-1.93.1-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-target-${{ runner.os }}-1.93.1-
      - name: Restore pinned audit binaries
        id: audit-tools
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.local/bin/gitleaks
            ~/.cargo/bin/cargo-audit
            ~/.cargo/bin/cargo-deny
          key: audit-tools-${{ runner.os }}-gitleaks-8.30.1-audit-0.22.2-deny-0.19.7
      - name: Install missing pinned audit binaries
        run: |
          mkdir -p "$HOME/.local/bin"
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          command -v gitleaks >/dev/null || GOBIN="$HOME/.local/bin" go install github.com/zricethezav/gitleaks/v8@v8.30.1
          command -v cargo-audit >/dev/null || cargo install --locked cargo-audit --version 0.22.2
          command -v cargo-deny >/dev/null || cargo install --locked cargo-deny --version 0.19.7
          command -v rg >/dev/null
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Full Linux validation
        run: bash scripts/check.sh full

  windows:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.93.1 --profile minimal
      - id: registry-cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-registry-${{ runner.os }}-
      - id: target-cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: target
          key: cargo-target-${{ runner.os }}-1.93.1-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-target-${{ runner.os }}-1.93.1-
      - name: Test paper execution on Windows
        run: cargo test --locked
      - name: Prove native-Windows live signing fails closed
        run: cargo test --locked --features live native_windows_live_signing_is_rejected
      - name: Save Cargo registry cache from main
        if: success() && github.ref == 'refs/heads/main' && steps.registry-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Save Cargo target cache from main
        if: success() && github.ref == 'refs/heads/main' && steps.target-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: target
          key: cargo-target-${{ runner.os }}-1.93.1-${{ hashFiles('Cargo.lock') }}
